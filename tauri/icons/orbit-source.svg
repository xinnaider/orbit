<svg viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="512" height="512" rx="96" fill="#0a0a0a"/>

  <!-- Outer orbital ring — stroke engrossado de 16 para 44 -->
  <ellipse
    cx="256" cy="256"
    rx="200" ry="78"
    stroke="#00d47e"
    stroke-width="44"
    fill="none"
    transform="rotate(-38 256 256)"
  />

  <!-- Inner orbital ring — stroke engrossado de 8 para 22 -->
  <ellipse
    cx="256" cy="256"
    rx="130" ry="50"
    stroke="#00d47e"
    stroke-width="22"
    fill="none"
    opacity="0.45"
    transform="rotate(-38 256 256)"
  />

  <!-- Central body -->
  <circle cx="256" cy="256" r="52" fill="#00d47e"/>
  <circle cx="256" cy="256" r="34" fill="#0a0a0a"/>
  <circle cx="256" cy="256" r="16" fill="#00d47e" opacity="0.85"/>

  <!-- Satellite dot -->
  <circle cx="418" cy="162" r="30" fill="#00d47e" opacity="0.9"/>
</svg>
