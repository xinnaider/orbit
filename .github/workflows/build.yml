name: Build

on:
  push:
    branches: [master, dev]
    tags:
      - 'v*'
    paths-ignore:
      - '**.md'
      - '.github/ISSUE_TEMPLATE/**'
      - 'docs/**'
      - 'media/**'
      - 'LICENSE'
      - 'landing/**'
      - 'scripts/**'
  pull_request:
    branches: [master, dev]
    paths-ignore:
      - '**.md'
      - '.github/ISSUE_TEMPLATE/**'
      - 'docs/**'
      - 'media/**'
      - 'LICENSE'
      - 'landing/**'
      - 'scripts/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  lint:
    name: Lint
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: tauri -> tauri/target
          shared-key: 'rust-windows'
          cache-on-failure: true

      - run: npm ci

      - name: Create sidecar placeholder for Tauri build validation
        shell: pwsh
        run: |
          $triple = rustc -vV | Select-String '^host:' | ForEach-Object { ($_ -split ':')[1].Trim() }
          $ext = if ($triple -match 'windows') { '.exe' } else { '' }
          $dir = 'tauri/binaries'
          New-Item -ItemType Directory -Path $dir -Force | Out-Null
          $path = Join-Path $dir "orbit-mcp-$triple$ext"
          if (-not (Test-Path $path)) { New-Item -ItemType File -Path $path -Force | Out-Null }
          Write-Host "Created placeholder: $path"

      - name: Pre-build release dependencies for cache sharing
        run: cargo check --manifest-path tauri/Cargo.toml --release

      - name: Format check — Rust (rustfmt)
        run: cargo fmt --manifest-path tauri/Cargo.toml --check

      - name: Format check — TypeScript/Svelte (prettier)
        run: npx prettier --check "ui/**/*.{ts,svelte,css}"

      - name: Lint — Rust (clippy)
        run: cargo clippy --manifest-path tauri/Cargo.toml -- -D warnings

      - name: Lint — TypeScript/Svelte (eslint + svelte-check)
        run: npx svelte-kit sync && npx eslint ui --max-warnings 0 && npx svelte-check --tsconfig tsconfig.json --fail-on-warnings

  build-windows:
    name: Build Windows (.exe)
    runs-on: windows-latest
    needs: lint
    if: github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: tauri -> tauri/target
          shared-key: 'rust-windows'
          cache-on-failure: true

      - name: Install Node dependencies
        run: npm ci

      - name: Check signing key (debug)
        shell: pwsh
        run: |
          if ($env:TAURI_SIGNING_PRIVATE_KEY) {
            Write-Host "TAURI_SIGNING_PRIVATE_KEY is set (length=$($env:TAURI_SIGNING_PRIVATE_KEY.Length))"
          } else {
            Write-Host "::error::TAURI_SIGNING_PRIVATE_KEY is EMPTY or missing"
            exit 1
          }
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Stamp dev version + patch updater endpoint (dev branch only)
        if: github.ref == 'refs/heads/dev'
        shell: pwsh
        run: |
          $conf = Get-Content tauri/tauri.conf.json -Raw | ConvertFrom-Json
          # Append -dev.<run_number> so updater sees a newer version each build
          $conf.version = "$($conf.version)-dev.${{ github.run_number }}"
          # Point updater to nightly release instead of stable latest
          $conf.plugins.updater.endpoints = @(
            "https://github.com/xinnaider/orbit/releases/download/nightly/latest-{{target}}-{{arch}}.json"
          )
          $conf | ConvertTo-Json -Depth 10 | Set-Content tauri/tauri.conf.json -Encoding utf8NoBOM
          Write-Host "Version stamped: $($conf.version)"
          Write-Host "Updater endpoint: $($conf.plugins.updater.endpoints[0])"

      - name: Build Tauri app
        shell: pwsh
        run: |
          # MSI requires numeric-only pre-release (Windows versioning) — skip it for dev builds
          if ("${{ github.ref }}" -eq "refs/heads/dev") {
            npm run tauri:build -- --bundles nsis
          } else {
            npm run tauri:build
          }
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Rename installer to fixed name (dev builds only)
        if: github.ref == 'refs/heads/dev'
        shell: pwsh
        run: |
          # Use a fixed filename so the nightly release doesn't accumulate versioned files
          $exe = Get-ChildItem tauri/target/release/bundle/nsis -Filter "*-setup.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($null -ne $exe) {
            $fixed = Join-Path $exe.DirectoryName "Orbit-nightly-setup.exe"
            Rename-Item $exe.FullName $fixed
            # Also rename .sig
            $sig = "$($exe.FullName).sig"
            if (Test-Path $sig) { Rename-Item $sig "$fixed.sig" }
            Write-Host "Renamed to Orbit-nightly-setup.exe"
          }

      - name: Compute SHA-256 of installer
        shell: pwsh
        run: |
          $exe = Get-ChildItem tauri/target/release/bundle/msi/*.msi, tauri/target/release/bundle/nsis/*.exe -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($null -eq $exe) {
            $exe = Get-ChildItem tauri/target/release/orbit.exe -ErrorAction SilentlyContinue | Select-Object -First 1
          }
          if ($null -ne $exe) {
            $hash = (Get-FileHash $exe.FullName -Algorithm SHA256).Hash.ToLower()
            "$hash  $($exe.Name)" | Out-File -FilePath sha256sum.txt -Encoding utf8
            Write-Host "SHA256: $hash"
            Write-Host "File: $($exe.FullName)"
          }

      - name: List bundle contents (debug)
        shell: pwsh
        run: |
          Write-Host "=== tauri/target/release/bundle ==="
          if (Test-Path tauri/target/release/bundle) {
            Get-ChildItem tauri/target/release/bundle -Recurse | Select-Object FullName, Length
          } else {
            Write-Host "Directory not found"
          }

      - name: Generate latest-windows-x86_64.json for updater
        shell: pwsh
        run: |
          $isDev = "${{ github.ref }}" -eq "refs/heads/dev"
          $version = "${{ github.ref_name }}"
          if ($version.StartsWith("v")) {
            $version = $version.TrimStart("v")
            $releaseTag = "v$version"
          } elseif ($isDev) {
            # Version was stamped as X.Y.Z-dev.<run> by the previous step
            $conf = Get-Content tauri/tauri.conf.json -Raw | ConvertFrom-Json
            $version = $conf.version
            $releaseTag = "nightly"
          } else {
            $version = "0.0.0-nightly"
            $releaseTag = "nightly-${{ github.run_number }}"
          }

          # Tauri 2 signs the .exe directly — look for .exe.sig
          $exe = Get-ChildItem tauri/target/release/bundle/nsis -Filter "*-setup.exe" -ErrorAction SilentlyContinue |
            Sort-Object Name | Select-Object -First 1
          if ($null -eq $exe) {
            Write-Host "::error::No *-setup.exe found in tauri/target/release/bundle/nsis"
            exit 1
          }

          $sigFile = "$($exe.FullName).sig"
          if (-not (Test-Path $sigFile)) {
            Write-Host "::error::.sig file not found: $sigFile"
            exit 1
          }

          $signature = Get-Content $sigFile -Raw
          $pubDate = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
          $downloadUrl = "https://github.com/xinnaider/orbit/releases/download/$releaseTag/$($exe.Name)"

          $latestJson = @{
            version   = $version
            notes     = "See the full changelog at https://github.com/xinnaider/orbit/releases/tag/v$version"
            pub_date  = $pubDate
            signature = $signature.Trim()
            url       = $downloadUrl
          } | ConvertTo-Json -Depth 5

          $latestJson | Out-File -FilePath latest-windows-x86_64.json -Encoding utf8NoBOM
          Write-Host "latest-windows-x86_64.json generated:"
          Get-Content latest-windows-x86_64.json

          # Also generate latest.json for backward compat with v0.2.x clients
          # (endpoint changed from latest.json to latest-{target}.json in v0.3.0)
          Copy-Item latest-windows-x86_64.json latest.json
          Write-Host "latest.json (compat) generated."

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: orbit-windows-${{ github.sha }}
          path: |
            tauri/target/release/bundle/msi/*.msi
            tauri/target/release/bundle/msi/*.msi.sig
            tauri/target/release/bundle/nsis/*.exe
            tauri/target/release/bundle/nsis/*.exe.sig
            tauri/target/release/orbit.exe
            latest-windows-x86_64.json
            latest.json
            sha256sum.txt
          if-no-files-found: warn
          retention-days: 30

      - name: Resolve release metadata
        if: github.event_name == 'push'
        id: meta
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "make_latest=true" >> "$GITHUB_OUTPUT"
          elif [[ "$GITHUB_REF" == refs/heads/dev ]]; then
            # Fixed tag — always overwritten, never promoted to "latest"
            echo "tag=nightly" >> "$GITHUB_OUTPUT"
            echo "name=Nightly (dev)" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "make_latest=false" >> "$GITHUB_OUTPUT"
          else
            echo "tag=nightly-${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
            echo "name=nightly-${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "make_latest=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          prerelease: ${{ steps.meta.outputs.prerelease }}
          make_latest: ${{ steps.meta.outputs.make_latest }}
          files: |
            tauri/target/release/bundle/msi/*.msi
            tauri/target/release/bundle/msi/*.msi.sig
            tauri/target/release/bundle/nsis/*.exe
            tauri/target/release/bundle/nsis/*.exe.sig
            latest-windows-x86_64.json
            latest.json
            sha256sum.txt
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    name: Build Linux (.AppImage)
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: tauri -> tauri/target
          shared-key: 'rust-linux'
          cache-on-failure: true

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            jq \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev

      - name: Install Node dependencies
        run: npm ci

      - name: Stamp dev version + patch updater endpoint (dev branch only)
        if: github.ref == 'refs/heads/dev'
        shell: bash
        run: |
          version=$(jq -r '.version' tauri/tauri.conf.json)
          new_version="${version}-dev.${{ github.run_number }}"
          jq --arg v "$new_version" \
             --arg ep "https://github.com/xinnaider/orbit/releases/download/nightly/latest-{{target}}-{{arch}}.json" \
             '.version = $v | .plugins.updater.endpoints = [$ep]' \
             tauri/tauri.conf.json > tmp.json && mv tmp.json tauri/tauri.conf.json
          echo "Version stamped: $new_version"

      - name: Build Tauri app
        run: npm run tauri:build -- --bundles appimage
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Rename installer to fixed name (dev builds only)
        if: github.ref == 'refs/heads/dev'
        shell: bash
        run: |
          appimage=$(ls tauri/target/release/bundle/appimage/*.AppImage 2>/dev/null | head -1)
          if [ -n "$appimage" ]; then
            dir=$(dirname "$appimage")
            mv "$appimage" "$dir/Orbit-nightly.AppImage"
            [ -f "${appimage}.sig" ] && mv "${appimage}.sig" "$dir/Orbit-nightly.AppImage.sig"
            echo "Renamed to Orbit-nightly.AppImage"
          fi

      - name: Generate latest-linux-x86_64.json for updater
        shell: bash
        run: |
          is_dev=$([[ "$GITHUB_REF" == refs/heads/dev ]] && echo true || echo false)

          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            version="${GITHUB_REF_NAME#v}"
            release_tag="${GITHUB_REF_NAME}"
          elif [[ "$is_dev" == "true" ]]; then
            version=$(jq -r '.version' tauri/tauri.conf.json)
            release_tag="nightly"
          else
            version="0.0.0-nightly"
            release_tag="nightly-${{ github.run_number }}"
          fi

          appimage=$(ls tauri/target/release/bundle/appimage/*.AppImage 2>/dev/null | head -1)
          if [ -z "$appimage" ]; then
            echo "::error::No .AppImage found in tauri/target/release/bundle/appimage/"
            exit 1
          fi

          sig_file="${appimage}.sig"
          if [ ! -f "$sig_file" ]; then
            echo "::error::.sig file not found: $sig_file"
            exit 1
          fi

          signature=$(cat "$sig_file")
          pub_date=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
          filename=$(basename "$appimage")
          download_url="https://github.com/xinnaider/orbit/releases/download/${release_tag}/${filename}"

          jq -n \
            --arg version  "$version" \
            --arg notes    "See the full changelog at https://github.com/xinnaider/orbit/releases" \
            --arg pub_date "$pub_date" \
            --arg sig      "$signature" \
            --arg url      "$download_url" \
            '{version: $version, notes: $notes, pub_date: $pub_date, signature: $sig, url: $url}' \
            > latest-linux-x86_64.json

          echo "latest-linux-x86_64.json generated:"
          cat latest-linux-x86_64.json

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: orbit-linux-${{ github.sha }}
          path: |
            tauri/target/release/bundle/appimage/*.AppImage
            tauri/target/release/bundle/appimage/*.AppImage.sig
            latest-linux-x86_64.json
          if-no-files-found: warn
          retention-days: 30

      - name: Resolve release metadata
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        id: meta
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "make_latest=true" >> "$GITHUB_OUTPUT"
          elif [[ "$GITHUB_REF" == refs/heads/dev ]]; then
            echo "tag=nightly" >> "$GITHUB_OUTPUT"
            echo "name=Nightly (dev)" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "make_latest=false" >> "$GITHUB_OUTPUT"
          else
            echo "tag=nightly-${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
            echo "name=nightly-${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "make_latest=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create/update Release with Linux assets
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          prerelease: ${{ steps.meta.outputs.prerelease }}
          make_latest: ${{ steps.meta.outputs.make_latest }}
          files: |
            tauri/target/release/bundle/appimage/*.AppImage
            tauri/target/release/bundle/appimage/*.AppImage.sig
            latest-linux-x86_64.json
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    name: Build macOS (.dmg)
    runs-on: macos-latest
    needs: lint
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: tauri -> tauri/target
          shared-key: 'rust-macos'
          cache-on-failure: true

      - name: Install Node dependencies
        run: npm ci

      - name: Stamp dev version + patch updater endpoint (dev branch only)
        if: github.ref == 'refs/heads/dev'
        shell: bash
        run: |
          version=$(jq -r '.version' tauri/tauri.conf.json)
          new_version="${version}-dev.${{ github.run_number }}"
          jq --arg v "$new_version" \
             --arg ep "https://github.com/xinnaider/orbit/releases/download/nightly/latest-{{target}}-{{arch}}.json" \
             '.version = $v | .plugins.updater.endpoints = [$ep]' \
             tauri/tauri.conf.json > tmp.json && mv tmp.json tauri/tauri.conf.json
          echo "Version stamped: $new_version"

      - name: Build Tauri app
        run: npm run tauri:build -- --bundles app,dmg
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Rename installer to fixed name (dev builds only)
        if: github.ref == 'refs/heads/dev'
        shell: bash
        run: |
          dmg=$(ls tauri/target/release/bundle/dmg/*.dmg 2>/dev/null | head -1)
          if [ -n "$dmg" ]; then
            dir=$(dirname "$dmg")
            mv "$dmg" "$dir/Orbit-nightly.dmg"
            echo "Renamed to Orbit-nightly.dmg"
          fi
          tarball=$(ls tauri/target/release/bundle/macos/*.app.tar.gz 2>/dev/null | head -1)
          if [ -n "$tarball" ]; then
            dir=$(dirname "$tarball")
            mv "$tarball" "$dir/Orbit-nightly.app.tar.gz"
            [ -f "${tarball}.sig" ] && mv "${tarball}.sig" "$dir/Orbit-nightly.app.tar.gz.sig"
            echo "Renamed to Orbit-nightly.app.tar.gz"
          fi

      - name: Generate latest-macos-x86_64.json for updater
        shell: bash
        run: |
          is_dev=$([[ "$GITHUB_REF" == refs/heads/dev ]] && echo true || echo false)

          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            version="${GITHUB_REF_NAME#v}"
            release_tag="${GITHUB_REF_NAME}"
          elif [[ "$is_dev" == "true" ]]; then
            version=$(jq -r '.version' tauri/tauri.conf.json)
            release_tag="nightly"
          else
            version="0.0.0-nightly"
            release_tag="nightly-${{ github.run_number }}"
          fi

          tarball=$(ls tauri/target/release/bundle/macos/*.app.tar.gz 2>/dev/null | head -1)
          if [ -z "$tarball" ]; then
            echo "::error::No .app.tar.gz found in tauri/target/release/bundle/macos/"
            exit 1
          fi

          sig_file="${tarball}.sig"
          if [ ! -f "$sig_file" ]; then
            echo "::warning::.sig file not found — skipping updater JSON (signing key may not be set)"
            exit 0
          fi

          signature=$(cat "$sig_file")
          pub_date=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
          filename=$(basename "$tarball")
          download_url="https://github.com/xinnaider/orbit/releases/download/${release_tag}/${filename}"

          jq -n \
            --arg version  "$version" \
            --arg notes    "See the full changelog at https://github.com/xinnaider/orbit/releases" \
            --arg pub_date "$pub_date" \
            --arg sig      "$signature" \
            --arg url      "$download_url" \
            '{version: $version, notes: $notes, pub_date: $pub_date, signature: $sig, url: $url}' \
            > latest-macos-x86_64.json

          echo "latest-macos-x86_64.json generated:"
          cat latest-macos-x86_64.json

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: orbit-macos-${{ github.sha }}
          path: |
            tauri/target/release/bundle/dmg/*.dmg
            tauri/target/release/bundle/macos/*.app.tar.gz
            tauri/target/release/bundle/macos/*.app.tar.gz.sig
            latest-macos-x86_64.json
          if-no-files-found: warn
          retention-days: 30

      - name: Resolve release metadata
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        id: meta
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "make_latest=true" >> "$GITHUB_OUTPUT"
          elif [[ "$GITHUB_REF" == refs/heads/dev ]]; then
            echo "tag=nightly" >> "$GITHUB_OUTPUT"
            echo "name=Nightly (dev)" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "make_latest=false" >> "$GITHUB_OUTPUT"
          else
            echo "tag=nightly-${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
            echo "name=nightly-${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "make_latest=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create/update Release with macOS assets
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          prerelease: ${{ steps.meta.outputs.prerelease }}
          make_latest: ${{ steps.meta.outputs.make_latest }}
          files: |
            tauri/target/release/bundle/dmg/*.dmg
            tauri/target/release/bundle/macos/*.app.tar.gz
            tauri/target/release/bundle/macos/*.app.tar.gz.sig
            latest-macos-x86_64.json
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
