name: Build

on:
  push:
    branches: [master]
    tags:
      - 'v*'
    paths-ignore:
      - '**.md'
      - '.github/ISSUE_TEMPLATE/**'
      - 'docs/**'
      - 'LICENSE'
  pull_request:
    branches: [master]
    paths-ignore:
      - '**.md'
      - '.github/ISSUE_TEMPLATE/**'
      - 'docs/**'
      - 'LICENSE'
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: front -> front/target

      - run: npm ci

      - name: Format check — Rust (rustfmt)
        run: cargo fmt --manifest-path front/Cargo.toml --check

      - name: Format check — TypeScript/Svelte (prettier)
        run: npx prettier --check "api/**/*.{ts,svelte,css}"

      - name: Lint — Rust (clippy)
        run: cargo clippy --manifest-path front/Cargo.toml -- -D warnings

      - name: Lint — TypeScript/Svelte (eslint + svelte-check)
        run: npx svelte-kit sync && npx eslint api --max-warnings 0 && npx svelte-check --tsconfig tsconfig.json --fail-on-warnings

  build-windows:
    name: Build Windows (.exe)
    runs-on: windows-latest
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: front -> front/target

      - name: Install Node dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri:build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Compute SHA-256 of installer
        shell: pwsh
        run: |
          $exe = Get-ChildItem front/target/release/bundle/msi/*.msi, front/target/release/bundle/nsis/*.exe -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($null -eq $exe) {
            $exe = Get-ChildItem front/target/release/orbit.exe -ErrorAction SilentlyContinue | Select-Object -First 1
          }
          if ($null -ne $exe) {
            $hash = (Get-FileHash $exe.FullName -Algorithm SHA256).Hash.ToLower()
            "$hash  $($exe.Name)" | Out-File -FilePath sha256sum.txt -Encoding utf8
            Write-Host "SHA256: $hash"
            Write-Host "File: $($exe.FullName)"
          }

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: orbit-windows-${{ github.sha }}
          path: |
            front/target/release/bundle/msi/*.msi
            front/target/release/bundle/nsis/*.exe
            front/target/release/orbit.exe
            sha256sum.txt
          if-no-files-found: warn
          retention-days: 30

      - name: Resolve release metadata
        if: github.event_name == 'push'
        id: meta
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            echo "tag=nightly-${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
            echo "name=nightly-${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          prerelease: ${{ steps.meta.outputs.prerelease }}
          files: |
            front/target/release/bundle/msi/*.msi
            front/target/release/bundle/nsis/*.exe
            sha256sum.txt
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
